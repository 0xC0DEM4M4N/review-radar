<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 160" width="240" height="160">
  <defs>
    <linearGradient id="screenGlowLight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0891b2" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#0891b2" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="glowLight">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="240" height="160" fill="#f1f5f9" rx="8"/>

  <!-- Desk surface -->
  <rect x="10" y="125" width="220" height="30" fill="#e2e8f0" rx="4"/>
  <line x1="10" y1="125" x2="230" y2="125" stroke="#0891b2" stroke-opacity="0.2" stroke-width="1"/>

  <!-- Monitor stand -->
  <rect x="105" y="95" width="30" height="30" fill="#cbd5e1" rx="2"/>
  <rect x="95" y="118" width="50" height="8" fill="#cbd5e1" rx="2"/>

  <!-- Monitor screen -->
  <rect x="55" y="25" width="130" height="75" fill="#e2e8f0" stroke="#0891b2" stroke-opacity="0.3" stroke-width="1.5" rx="4"/>
  <rect x="60" y="30" width="120" height="60" fill="url(#screenGlowLight)" rx="2"/>

  <!-- Code lines on screen -->
  <g opacity="0.7">
    <rect x="68" y="38" width="45" height="3" fill="#0891b2" rx="1.5">
      <animate attributeName="width" values="45;65;50;45" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="46" width="80" height="3" fill="#16a34a" rx="1.5" opacity="0.8">
      <animate attributeName="width" values="80;60;85;80" dur="1.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="54" width="35" height="3" fill="#d97706" rx="1.5" opacity="0.7">
      <animate attributeName="width" values="35;55;40;35" dur="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="62" width="70" height="3" fill="#0891b2" rx="1.5" opacity="0.6">
      <animate attributeName="width" values="70;45;75;70" dur="2.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="70" width="50" height="3" fill="#7c3aed" rx="1.5" opacity="0.6">
      <animate attributeName="width" values="50;70;55;50" dur="1.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="78" width="30" height="3" fill="#0891b2" rx="1.5" opacity="0.5">
      <animate attributeName="width" values="30;50;35;30" dur="1.6s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Cursor blink -->
  <rect x="68" y="78" width="3" height="10" fill="#0891b2" filter="url(#glowLight)">
    <animate attributeName="opacity" values="1;0;1" dur="0.8s" repeatCount="indefinite"/>
  </rect>

  <!-- Developer head (silhouette) -->
  <ellipse cx="120" cy="115" rx="22" ry="18" fill="#cbd5e1"/>
  <ellipse cx="120" cy="108" rx="16" ry="14" fill="#cbd5e1"/>
  <!-- Hair tuft -->
  <path d="M108 96 Q112 88 118 94 Q122 86 128 94 Q132 90 134 96" fill="none" stroke="#0891b2" stroke-width="1.5" stroke-opacity="0.5" stroke-linecap="round"/>

  <!-- Eyes (glasses reflection) -->
  <rect x="112" y="106" width="5" height="3" fill="#0891b2" opacity="0.6" rx="1">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="123" y="106" width="5" height="3" fill="#0891b2" opacity="0.6" rx="1">
    <animate attributeName="opacity" values="0.6;0.9;0.6" dur="3s" begin="0.5s" repeatCount="indefinite"/>
  </rect>

  <!-- Left arm -->
  <path d="M95 125 Q85 115 75 120" fill="none" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>
  <!-- Right arm -->
  <path d="M145 125 Q155 115 165 120" fill="none" stroke="#cbd5e1" stroke-width="8" stroke-linecap="round"/>

  <!-- Left hand -->
  <g>
    <ellipse cx="72" cy="122" rx="10" ry="7" fill="#cbd5e1"/>
    <!-- Fingers typing -->
    <rect x="64" y="118" width="3" height="8" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="0.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="68" y="117" width="3" height="9" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 5;0 0" dur="0.12s" begin="0.03s" repeatCount="indefinite"/>
    </rect>
    <rect x="72" y="116" width="3" height="10" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="0.18s" begin="0.06s" repeatCount="indefinite"/>
    </rect>
    <rect x="76" y="117" width="3" height="9" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 5;0 0" dur="0.14s" begin="0.09s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Right hand -->
  <g>
    <ellipse cx="168" cy="122" rx="10" ry="7" fill="#cbd5e1"/>
    <!-- Fingers typing -->
    <rect x="160" y="117" width="3" height="9" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 5;0 0" dur="0.13s" begin="0.02s" repeatCount="indefinite"/>
    </rect>
    <rect x="164" y="116" width="3" height="10" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="0.17s" begin="0.05s" repeatCount="indefinite"/>
    </rect>
    <rect x="168" y="117" width="3" height="9" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 5;0 0" dur="0.11s" begin="0.08s" repeatCount="indefinite"/>
    </rect>
    <rect x="172" y="118" width="3" height="8" fill="#cbd5e1" rx="1.5">
      <animateTransform attributeName="transform" type="translate" values="0 0;0 4;0 0" dur="0.16s" begin="0.11s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Keyboard -->
  <rect x="55" y="128" width="130" height="14" fill="#e2e8f0" stroke="#0891b2" stroke-opacity="0.2" stroke-width="1" rx="3"/>
  <!-- Keys -->
  <g fill="#0891b2" opacity="0.5">
    <rect x="60" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="66" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.25s" begin="0.05s" repeatCount="indefinite"/>
    </rect>
    <rect x="72" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.18s" begin="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="78" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.22s" begin="0.03s" repeatCount="indefinite"/>
    </rect>
    <rect x="84" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.15s" begin="0.08s" repeatCount="indefinite"/>
    </rect>
    <rect x="90" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.19s" begin="0.12s" repeatCount="indefinite"/>
    </rect>
    <rect x="96" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.21s" begin="0.06s" repeatCount="indefinite"/>
    </rect>
    <rect x="102" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.17s" begin="0.14s" repeatCount="indefinite"/>
    </rect>
    <rect x="108" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.23s" begin="0.02s" repeatCount="indefinite"/>
    </rect>
    <rect x="114" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.14s" begin="0.09s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.2s" begin="0.07s" repeatCount="indefinite"/>
    </rect>
    <rect x="126" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.16s" begin="0.11s" repeatCount="indefinite"/>
    </rect>
    <rect x="132" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.24s" begin="0.04s" repeatCount="indefinite"/>
    </rect>
    <rect x="138" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.13s" begin="0.13s" repeatCount="indefinite"/>
    </rect>
    <rect x="144" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.19s" begin="0.01s" repeatCount="indefinite"/>
    </rect>
    <rect x="150" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.21s" begin="0.1s" repeatCount="indefinite"/>
    </rect>
    <rect x="156" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.15s" begin="0.15s" repeatCount="indefinite"/>
    </rect>
    <rect x="162" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.18s" begin="0.06s" repeatCount="indefinite"/>
    </rect>
    <rect x="168" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.22s" begin="0.12s" repeatCount="indefinite"/>
    </rect>
    <rect x="174" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.17s" begin="0.08s" repeatCount="indefinite"/>
    </rect>
    <rect x="180" y="131" width="4" height="4" rx="1">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="0.2s" begin="0.03s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Coffee cup -->
  <g transform="translate(195, 108)">
    <rect x="0" y="8" width="12" height="14" fill="#cbd5e1" stroke="#0891b2" stroke-opacity="0.3" stroke-width="1" rx="2"/>
    <path d="M12 11 Q17 11 17 15 Q17 19 12 19" fill="none" stroke="#0891b2" stroke-opacity="0.3" stroke-width="1.5"/>
    <!-- Steam -->
    <path d="M3 6 Q5 2 3 -2" fill="none" stroke="#0891b2" stroke-opacity="0.4" stroke-width="1" stroke-linecap="round">
      <animate attributeName="d" values="M3 6 Q5 2 3 -2;M3 5 Q1 1 3 -3;M3 6 Q5 2 3 -2" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.15;0.4" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M8 6 Q6 2 8 -2" fill="none" stroke="#0891b2" stroke-opacity="0.3" stroke-width="1" stroke-linecap="round">
      <animate attributeName="d" values="M8 6 Q6 2 8 -2;M8 5 Q10 1 8 -3;M8 6 Q6 2 8 -2" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0;0.3" dur="2.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Speed lines (left) -->
  <g stroke="#0891b2" stroke-width="1" stroke-linecap="round" opacity="0.2">
    <line x1="15" y1="50" x2="35" y2="50">
      <animate attributeName="x1" values="15;5;15" dur="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.4s" repeatCount="indefinite"/>
    </line>
    <line x1="10" y1="70" x2="30" y2="70">
      <animate attributeName="x1" values="10;0;10" dur="0.35s" begin="0.1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.35s" begin="0.1s" repeatCount="indefinite"/>
    </line>
    <line x1="20" y1="90" x2="40" y2="90">
      <animate attributeName="x1" values="20;10;20" dur="0.5s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.5s" begin="0.2s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Speed lines (right) -->
  <g stroke="#0891b2" stroke-width="1" stroke-linecap="round" opacity="0.2">
    <line x1="225" y1="55" x2="205" y2="55">
      <animate attributeName="x1" values="225;235;225" dur="0.45s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.45s" repeatCount="indefinite"/>
    </line>
    <line x1="230" y1="75" x2="210" y2="75">
      <animate attributeName="x1" values="230;240;230" dur="0.38s" begin="0.08s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.38s" begin="0.08s" repeatCount="indefinite"/>
    </line>
    <line x1="220" y1="95" x2="200" y2="95">
      <animate attributeName="x1" values="220;230;220" dur="0.42s" begin="0.15s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0;0.2" dur="0.42s" begin="0.15s" repeatCount="indefinite"/>
    </line>
  </g>

</svg>
