name = "review-radar"
compatibility_date = "2024-01-01"
pages_build_output_dir = "dist"

[vars]
# Add any public environment variables here if needed

# REQUIRED: Set the SESSION_SECRET for encrypting GitHub tokens in cookies.
# Run: wrangler secret put SESSION_SECRET
# This secret is used server-side only and must be a long random string.
#
# OPTIONAL (for OAuth): Create a GitHub OAuth App at https://github.com/settings/developers
#   Authorization callback URL: https://<your-domain>/api/auth/callback
# Then set:
#   wrangler secret put GITHUB_CLIENT_ID
#   wrangler secret put GITHUB_CLIENT_SECRET
